<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Jobko - Job Finder Mobile App</title>
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
  <!-- font -->
  <link rel="stylesheet" href="../fonts/fonts.css">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="../css/nouislider.min.css" />
  <link rel="stylesheet" href="../css/swiper-bundle.min.css">
  <link rel="stylesheet" type="text/css" href="../css/styles.css" />
  <!-- manifest json -->
  <link rel="manifest" href="../_manifest.json" data-pwa-version="set_in_manifest_and_pwa_js">
  <!-- Favicon and Touch Icons  -->
  <link rel="shortcut icon" href="../images/logo/168.png" />
  <link rel="apple-touch-icon-precomposed" href="../images/logo/168.png" />

</head>

<body>

  <header class="header-main">
    <button class="btn-left btn_back">
      <svg class="icon-back">
        <use href="../icon/sprite.svg#back"></use>
      </svg>
    </button>
    <h2 class="title">Currency</h2>
    <a href="home.html" class="btn-right">
      <svg class="icon-home icon">
        <use href="../icon/sprite.svg#home"></use>
      </svg>
    </a>
  </header>

  <div class="page-width main-page_localization spacing_top-3 spacing_bottom-2">
    <div class="box-search">
      <h6 class="title text-body-3">Select Currency</h6>
      <form class="form-search">
      <input type="search" placeholder="Search currencies...">
      <svg class="icon-search">
        <use href="../icon/sprite.svg#search2"></use>
      </svg>
    </form>
    </div>
    <div class="box-localization">
      <fieldset class="localization-item">
        <label for="us" class="label">
          <img src="../images/flags/usa2.svg" class="flag" alt="">
          <span class="text-body-3">United States Dollar (USD)</span>
        </label>
        <input type="radio" class="check" checked name="currency" id="us">
      </fieldset>
      <fieldset class="localization-item">
        <label for="jpy" class="label">
          <img src="../images/flags/jap.svg" class="flag" alt="">
          <span class="text-body-3">Japanese Yen (JPY)</span>
        </label>
        <input type="radio" class="check" name="currency" id="jpy">
      </fieldset>
      <fieldset class="localization-item">
        <label for="eur" class="label">
          <img src="../images/flags/euro.svg" class="flag" alt="">
          <span class="text-body-3">Euro (EUR)</span>
        </label>
        <input type="radio" class="check" name="currency" id="eur">
      </fieldset>
      <fieldset class="localization-item">
        <label for="ru" class="label">
          <img src="../images/flags/russia.svg" class="flag" alt="">
          <span class="text-body-3">Russian Ruble (RUB)</span>
        </label>
        <input type="radio" class="check" name="currency" id="ru">
      </fieldset>
      <fieldset class="localization-item">
        <label for="fr" class="label">
          <img src="../images/flags/fr.svg" class="flag" alt="">
          <span class="text-body-3">French Euro (EUR)</span>
        </label>
        <input type="radio" class="check" name="currency" id="fr">
      </fieldset>
      <fieldset class="localization-item">
        <label for="china" class="label">
          <img src="../images/flags/fr.svg" class="flag" alt="">
          <span class="text-body-3">Chinese Yuan (¥)</span>
        </label>
        <input type="radio" class="check" name="currency" id="china">
      </fieldset>
    </div>
  </div>

  <div class="menubar-button full">
    <a href="#" class="btn-primary">Update</a>
  </div>


  <script type="text/javascript" src="../js/bootstrap.min.js"></script>
  <script type="text/javascript" src="../js/jquery.min.js"></script>
  <script type="text/javascript" src="../js/lazysize.min.js"></script>
  <script type="text/javascript" src="../js/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="../js/carousel.js"></script>
  <script type="text/javascript" src="../js/jquery.nice-select.min.js"></script>
  <script type="text/javascript" src="../js/count-down.js"></script>
  <script type="text/javascript" src="../js/multiple-modal.js"></script>
  <script type="text/javascript" src="../js/nouislider.min.js"></script>
  <script type="text/javascript" src="../js/rangle-slider.js"></script>
  <script type="text/javascript" src="../js/init.js"></script>
  <script type="text/javascript" src="../js/main.js"></script>

</body>

</html>
