<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Jobko - Job Finder Mobile App</title>
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
  <!-- font -->
  <link rel="stylesheet" href="../fonts/fonts.css">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="../css/nouislider.min.css" />
  <link rel="stylesheet" href="../css/swiper-bundle.min.css">
  <link rel="stylesheet" type="text/css" href="../css/styles.css" />
  <!-- manifest json -->
  <link rel="manifest" href="../_manifest.json" data-pwa-version="set_in_manifest_and_pwa_js">
  <!-- Favicon and Touch Icons  -->
  <link rel="shortcut icon" href="../images/logo/168.png" />
  <link rel="apple-touch-icon-precomposed" href="../images/logo/168.png" />

</head>

<body>

  <header class="header-main header-abs">
    <button class="btn-left btn_back">
      <svg class="icon-back">
        <use href="../icon/sprite.svg#back"></use>
      </svg>
    </button>
    <div class="btn-right box-btn">
      <button class="wishlist">
        <svg class="icon-hearthFill">
          <use href="../icon/sprite.svg#hearthFill"></use>
        </svg>
      </button>
      <button class="share">
        <svg class="icon-share">
          <use href="../icon/sprite.svg#share"></use>
        </svg>
      </button>
    </div>

  </header>

  <div class="product-thumbs-slider page-width px-0">
      <div dir="ltr" class="swiper tf-product-media-main">
        <div class="swiper-wrapper">
          <!-- black -->
          <div class="swiper-slide" data-color="green" data-size="s">
            <a href="#" class="img-thumbnail"><img src="../images/user/product/product7.jpg" alt=""></a>
          </div>
          <div class="swiper-slide" data-color="red" data-size="m">
            <a href="#" class="img-thumbnail"><img src="../images/user/product/product8.jpg" alt=""></a>
          </div>
          <div class="swiper-slide" data-color="gray" data-size="l">
            <a href="#" class="img-thumbnail"><img src="../images/user/product/product9.jpg" alt=""></a>
          </div>
          <div class="swiper-slide" data-color="yellow" data-size="xl">
            <a href="#" class="img-thumbnail"><img src="../images/user/product/product10.jpg" alt=""></a>
          </div>
        </div>
        <div class="pagination-thumbs pagination-bullets style-3"></div>
        <div class="swiper-button-next nav-swiper thumbs-next"></div>
        <div class="swiper-button-prev nav-swiper thumbs-prev"></div>
      </div>
  </div>
  <div class="tf-product-info-wrap page-width">
    <div class="tf-product-info-list">
      <span class="label">Clothing</span>
      <div class="product-stock_price">
        <div class="box-rate-stock">
          <div class="rate-box">
            <svg class="icon-star"><use href="../icon/sprite.svg#star"></use></svg>4.8 <span class="num">(37)</span>
          </div>
          <div class="stock-box"><span  class="fw-medium">300+</span> Stocks</div>
        </div>
        <div class="box-price">
          <span class="price-sale">$98.99</span>
          <span class="price-new">$79.99</span>
        </div>
      </div>
      <h4 class="product-name">Double-Breasted Trench Coat</h4>
            <div class="tf-product-variant">
        <div class="variant-picker-item variant-size">
          <div class="variant-picker-label">
            <div>Size:<span class="variant-picker-label-value value-currentSize">m</span></div>
            <a href="#sizeGuide" class="size-guide link">Size Guide</a>
          </div>
          <div class="variant-picker-values">
            <span class="size-btn active" data-size="s">S</span>
            <span class="size-btn" data-size="m">M</span>
            <span class="size-btn" data-size="l">L</span>
            <span class="size-btn" data-size="xl">XL</span>
            <span class="size-btn disabled" data-size="xxl">XXL</span>
          </div>
        </div>
        <div class="variant-picker-item variant-color">
          <div class="variant-picker-label">
            Colors:<span class="variant-picker-label-value value-currentColor">Red</span>
          </div>
          <div class="variant-picker-values">
            <span class="color-btn red" data-color="red"><span class="check-color"></span></span>
            <span class="color-btn gray active" data-color="gray"><span class="check-color"></span></span>
            <span class="color-btn green" data-color="green"><span class="check-color"></span></span>
            <span class="color-btn yellow" data-color="yellow"><span class="check-color"></span></span>
          </div>
        </div>
      </div>
    </div>

  </div>




  <script type="text/javascript" src="../js/bootstrap.min.js"></script>
  <script type="text/javascript" src="../js/jquery.min.js"></script>
  <script type="text/javascript" src="../js/lazysize.min.js"></script>
  <script type="text/javascript" src="../js/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="../js/carousel.js"></script>
  <script type="text/javascript" src="../js/jquery.nice-select.min.js"></script>
  <script type="text/javascript" src="../js/count-down.js"></script>
  <script type="text/javascript" src="../js/multiple-modal.js"></script>
  <script type="text/javascript" src="../js/nouislider.min.js"></script>
  <script type="text/javascript" src="../js/rangle-slider.js"></script>
  <script type="text/javascript" src="../js/init.js"></script>
  <script type="text/javascript" src="../js/main.js"></script>

</body>

</html>
