<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Jobko - Job Finder Mobile App</title>
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
  <!-- font -->
  <link rel="stylesheet" href="../fonts/fonts.css">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="../css/nouislider.min.css" />
  <link rel="stylesheet" href="../css/swiper-bundle.min.css">
  <link rel="stylesheet" type="text/css" href="../css/styles.css" />
  <!-- manifest json -->
  <link rel="manifest" href="../_manifest.json" data-pwa-version="set_in_manifest_and_pwa_js">
  <!-- Favicon and Touch Icons  -->
  <link rel="shortcut icon" href="../images/logo/168.png" />
  <link rel="apple-touch-icon-precomposed" href="../images/logo/168.png" />

</head>

<body>

  <header class="header-main header-abs">
    <button class="btn-left btn_back">
      <svg class="icon-back">
        <use href="../icon/sprite.svg#back"></use>
      </svg>
    </button>
    <div class="btn-right box-btn">
      <button class="wishlist">
        <svg class="icon-hearthFill">
          <use href="../icon/sprite.svg#hearthFill"></use>
        </svg>
      </button>
      <button class="share">
        <svg class="icon-share">
          <use href="../icon/sprite.svg#share"></use>
        </svg>
      </button>
    </div>

  </header>

  <div class="product-thumbs-slider">

    <div class="flat-wrap-media-product">
      <div dir="ltr" class="swiper tf-product-media-main">
        <div class="swiper-wrapper">
          <!-- black -->
          <div class="swiper-slide" data-color="black" data-size="small">
            <div>black small</div>
          </div>
          <div class="swiper-slide" data-color="black" data-size="medium">
            <div>black md</div>

          </div>
          <div class="swiper-slide" data-color="black" data-size="large">
            <div>black lg</div>
          </div>
          <div class="swiper-slide" data-color="black" data-size="extra large">
            <div>black xl</div>

          </div>
          <!-- yellow -->
          <div class="swiper-slide" data-color="orange" data-size="small">
            <div>orange small</div>
          </div>
          <div class="swiper-slide" data-color="orange" data-size="medium">
            <div>orange md</div>

          </div>
          <!-- grey -->
          <div class="swiper-slide" data-color="green" data-size="large">
            <div>green lg</div>

          </div>
          <div class="swiper-slide" data-color="green" data-size="extra large">
            <div>green xl</div>
          </div>

        </div>
      </div>
      <div class="swiper-button-next nav-swiper thumbs-next"></div>
      <div class="swiper-button-prev nav-swiper thumbs-prev"></div>
    </div>
  </div>

  <div class="tf-product-info-wrap">
    <div class="tf-product-info-list">
      hhhhhhhh
      <div class="tf-product-variant">
        <div class="variant-picker-item variant-color">
          <div class="variant-picker-label">
            Colors:<span class="variant-picker-label-value value-currentColor">Black</span>
          </div>
          <div class="variant-picker-values">
            <div class="hover-tooltip tooltip-bot color-btn active" data-color="black">
              <span class="check-color bg-dark-3">black</span>
            </div>
            <div class="hover-tooltip tooltip-bot color-btn" data-color="orange">
              <span class="check-color bg-light-orange-2">orange</span>

            </div>
            <div class="hover-tooltip tooltip-bot color-btn" data-color="green">
              <span class="check-color bg-light-green">green</span>
            </div>
          </div>
        </div>
        <div class="variant-picker-item variant-size">
          <div class="variant-picker-label">
            <div>Size:<span class="variant-picker-label-value value-currentSize">Small</span>
            </div>
            <a href="#sizeGuide" data-bs-toggle="modal" class="size-guide link">Size
              Guide</a>
          </div>
          <div class="variant-picker-values">
            <span class="size-btn active" data-size="small">S</span>
            <span class="size-btn" data-size="medium">M</span>
            <span class="size-btn" data-size="large">L</span>
            <span class="size-btn" data-size="extra large">XL</span>
          </div>
        </div>
      </div>



    </div>

  </div>




  <script type="text/javascript" src="../js/bootstrap.min.js"></script>
  <script type="text/javascript" src="../js/jquery.min.js"></script>
  <script type="text/javascript" src="../js/lazysize.min.js"></script>
  <script type="text/javascript" src="../js/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="../js/carousel.js"></script>
  <script type="text/javascript" src="../js/jquery.nice-select.min.js"></script>
  <script type="text/javascript" src="../js/count-down.js"></script>
  <script type="text/javascript" src="../js/multiple-modal.js"></script>
  <script type="text/javascript" src="../js/nouislider.min.js"></script>
  <script type="text/javascript" src="../js/rangle-slider.js"></script>
  <script type="text/javascript" src="../js/init.js"></script>
  <script type="text/javascript" src="../js/main.js"></script>

</body>

</html>
