<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Jobko - Job Finder Mobile App</title>
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
  <!-- font -->
  <link rel="stylesheet" href="../fonts/fonts.css">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="../css/nouislider.min.css" />
  <link rel="stylesheet" href="../css/swiper-bundle.min.css">
  <link rel="stylesheet" type="text/css" href="../css/styles.css" />
  <!-- manifest json -->
  <link rel="manifest" href="../_manifest.json" data-pwa-version="set_in_manifest_and_pwa_js">
  <!-- Favicon and Touch Icons  -->
  <link rel="shortcut icon" href="../images/logo/168.png" />
  <link rel="apple-touch-icon-precomposed" href="../images/logo/168.png" />

</head>

<body>

  <header class="header-main">
    <button class="btn-left btn_back">
      <svg class="icon-back">
        <use href="../icon/sprite.svg#back"></use>
      </svg>
    </button>
    <h2 class="title">Become Seller</h2>
    <a href="home.html" class="btn-right">
      <svg class="icon-home icon">
        <use href="../icon/sprite.svg#home"></use>
      </svg>
    </a>
  </header>

  <div class="page-width main-page_become--seller spacing_top-3 spacing_bottom-2">
    <div class="box-seller_step">
      <div class="step-item active">
        <span class="step">1</span>
        <div class="content">
          <span class="label">Step 1/3</span>
          <div class="title">Information</div>
        </div>
      </div>
      <div class="step-item">
        <span class="step">2</span>
        <div class="content">
          <span class="label">Step 2/3</span>
          <div class="title">Document</div>
        </div>
      </div>
    </div>
    <fieldset class="fieldset">
      <label for="name" class="label">Shop Name</label>
      <input type="text" id="name" placeholder="Sailor Clothing">
    </fieldset>
    <fieldset class="fieldset">
      <label for="email" class="label">Email Address</label>
      <input type="text" id="email" placeholder="sailorclothing@gmail.com">
    </fieldset>
    <div class="fieldset">
      <label for="phone" class="label">Phone Number</label>
      <div class="select-phone">
        <div class="select-flag">
          <button class="select-current">
            <img src="../images/flags/usa1.svg" alt="">
            <span class="text-value">+1</span>
            <svg class="icon-arrowDown">
              <use href="../icon/sprite.svg#arrowDown"></use>
            </svg>
          </button>
          <ul class="select-list">
            <li data-value="+1">
              <img src="../images/flags/usa1.svg" alt="">
              <span>+1</span>
            </li>

            <li data-value="+84">
              <img src="../images/flags/vn.svg" alt="">
              <span>+84</span>
            </li>
            <li data-value="+33">
              <img src="../images/flags/fr.svg" alt="">
              <span>+33</span>
            </li>
          </ul>
          <input type="hidden" name="phone_code" value="+1">
        </div>
        <input id="phone" type="number" placeholder="707 797 0462">
      </div>
    </div>
    <fieldset class="select-flag fieldset">
      <label for="country" class="label">Country</label>
      <button class="select-current">
        <img src="../images/flags/usa2.svg" alt="">
        <span class="text-value">United States</span>
        <svg class="icon-arrowDown">
          <use href="../icon/sprite.svg#arrowDown"></use>
        </svg>
      </button>
      <ul class="select-list">
        <li data-value="US" class="active">
          <img src="../images/flags/usa2.svg" alt="">
          <span>United States</span>
        </li>

        <li data-value="VN">
          <img src="../images/flags/vn.svg" alt="">
          <span>Vietnam</span>
        </li>

        <li data-value="FR">
          <img src="../images/flags/fr.svg" alt="">
          <span>France</span>
        </li>
      </ul>
      <input type="hidden" name="country" value="US">
    </fieldset>
    <fieldset class="fieldset">
      <label for="state" class="label">State</label>
      <input type="text" id="state" placeholder="State/ Province">
    </fieldset>
    <div class="fieldset row-grid column-2">
      <fieldset>
        <label for="city" class="label">City</label>
        <input type="text" id="city" placeholder="State/ Province">
      </fieldset>
      <fieldset>
        <label for="zipCode" class="label">Zip Code</label>
        <input type="text" id="zipCode" placeholder="State/ Province">
      </fieldset>
    </div>
    <fieldset class="fieldset">
      <label for="address" class="label">Address</label>
      <input type="text" id="address" placeholder="Address">
    </fieldset>
    <fieldset class="fieldset">
      <label for="bio" class="label">Short Bio</label>
      <input type="text" id="bio" placeholder="Street, house, apartment/unit">
    </fieldset>
    <div class="fieldset box-availability">
      <div class="label">
        Availability
        <span class="box-check">
          <input type="checkbox" class="check2" name="availability" id="availability">
          <label for="availability">Open all</label>
        </span>
      </div>
      <div class="availability-item">
        <span class="day">Saturday</span>
        <div class="select">
          <select name="" id="">
            <option value="">09:00 AM - 6:30 PM</option>
            <option value="">07:00 AM - 4:30 PM</option>
            <option value="">08:00 AM - 8:30 PM</option>
          </select>
          <svg class="icon-arrowDown">
            <use href="../icon/sprite.svg#arrowDown"></use>
          </svg>
        </div>
        <button class="btn-delete"> 
          <svg class="icon-trash2">
            <use href="../icon/sprite.svg#trash2"></use>
          </svg>
        </button>
      </div>
      <div class="availability-item">
        <span class="day">Sunday</span>
        <div class="select">
          <select name="" id="">
            <option value="">09:00 AM - 6:30 PM</option>
            <option value="">07:00 AM - 4:30 PM</option>
            <option value="">08:00 AM - 8:30 PM</option>
          </select>
          <svg class="icon-arrowDown">
            <use href="../icon/sprite.svg#arrowDown"></use>
          </svg>
        </div>
        <button class="btn-plus"> 
          <svg class="icon-plus">
            <use href="../icon/sprite.svg#plus"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>


  <div class="menubar-button">
    <a href="profile.html" class="btn-line">Discard</a>
    <a href="become-seller-submit.html" class="btn-primary">Continue</a>
  </div>


  <script type="text/javascript" src="../js/bootstrap.min.js"></script>
  <script type="text/javascript" src="../js/jquery.min.js"></script>
  <script type="text/javascript" src="../js/lazysize.min.js"></script>
  <script type="text/javascript" src="../js/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="../js/carousel.js"></script>
  <script type="text/javascript" src="../js/jquery.nice-select.min.js"></script>
  <script type="text/javascript" src="../js/count-down.js"></script>
  <script type="text/javascript" src="../js/multiple-modal.js"></script>
  <script type="text/javascript" src="../js/nouislider.min.js"></script>
  <script type="text/javascript" src="../js/rangle-slider.js"></script>
  <script type="text/javascript" src="../js/init.js"></script>
  <script type="text/javascript" src="../js/main.js"></script>

</body>

</html>
