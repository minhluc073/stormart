<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Jobko - Job Finder Mobile App</title>
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
  <!-- font -->
  <link rel="stylesheet" href="../fonts/fonts.css">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="../css/nouislider.min.css" />
  <link rel="stylesheet" href="../css/swiper-bundle.min.css">
  <link rel="stylesheet" type="text/css" href="../css/styles.css" />
  <!-- manifest json -->
  <link rel="manifest" href="../_manifest.json" data-pwa-version="set_in_manifest_and_pwa_js">
  <!-- Favicon and Touch Icons  -->
  <link rel="shortcut icon" href="../images/logo/168.png" />
  <link rel="apple-touch-icon-precomposed" href="../images/logo/168.png" />

</head>

<body>

  <header class="header-main">
    <button class="btn-left btn_back">
      <svg class="icon-back">
        <use href="../icon/sprite.svg#back"></use>
      </svg>
    </button>
    <h2 class="title">Notification Setting</h2>
    <a href="home.html" class="btn-right">
      <svg class="icon-home icon">
        <use href="../icon/sprite.svg#home"></use>
      </svg>
    </a>
  </header>

  <div class="page-width main-page_notification spacing_top-2">
    <div class="box-notification">
      <p class="note">Push Notifications</p>
      <div class="noti-item">
        <label for="order" class="label">
          <span class="title">Orders</span>
          <p class="text">Orders Status, tracking announcements, price alerts</p>
        </label>
        <input type="checkbox" checked class="switch-check" id="order">
      </div>
      <div class="noti-item">
        <label for="promotions" class="label">
          <span class="title">Promotions</span>
          <p class="text">Don’t miss out on discounts, special offers, and more</p>
        </label>
        <input type="checkbox" checked class="switch-check" id="promotions">
      </div>
      <div class="noti-item">
        <label for="activates" class="label">
          <span class="title">Activates</span>
          <p class="text">Notification related to your account and more</p>
        </label>
        <input type="checkbox" class="switch-check" id="activates">
      </div>
      <div class="noti-item">
        <label for="coupon" class="label">
          <span class="title">Coupon</span>
          <p class="text">Daily check-in reminders, coins collection notices.</p>
        </label>
        <input type="checkbox" checked class="switch-check" id="coupon">
      </div>
      <div class="noti-item">
        <label for="interaction" class="label">
          <span class="title">Interaction message</span>
          <p class="text">Game interactions, Feed notification and more</p>
        </label>
        <input type="checkbox" class="switch-check" id="interaction">
      </div>
    </div>
    <div class="box-notification">
      <p class="note">Email Notifications</p>
      <div class="noti-item">
        <label for="orderEmail" class="label">
          <span class="title">Orders</span>
          <p class="text">Orders Status, tracking announcements, price alerts</p>
        </label>
        <input type="checkbox" checked class="switch-check" id="orderEmail">
      </div>
      <div class="noti-item">
        <label for="promotionsEmail" class="label">
          <span class="title">Promotions</span>
          <p class="text">Don’t miss out on discounts, special offers, and more</p>
        </label>
        <input type="checkbox" checked class="switch-check" id="promotionsEmail">
      </div>
      <div class="noti-item">
        <label for="services" class="label">
          <span class="title">Services</span>
          <p class="text">Get updates on account notices, alerts  message</p>
        </label>
        <input type="checkbox" class="switch-check" id="services">
      </div>
    </div>
  </div>




  <script type="text/javascript" src="../js/bootstrap.min.js"></script>
  <script type="text/javascript" src="../js/jquery.min.js"></script>
  <script type="text/javascript" src="../js/lazysize.min.js"></script>
  <script type="text/javascript" src="../js/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="../js/carousel.js"></script>
  <script type="text/javascript" src="../js/jquery.nice-select.min.js"></script>
  <script type="text/javascript" src="../js/count-down.js"></script>
  <script type="text/javascript" src="../js/multiple-modal.js"></script>
  <script type="text/javascript" src="../js/nouislider.min.js"></script>
  <script type="text/javascript" src="../js/rangle-slider.js"></script>
  <script type="text/javascript" src="../js/init.js"></script>
  <script type="text/javascript" src="../js/main.js"></script>

</body>

</html>
